input,select,textarea,button{font-family:'DM Sans',sans-serif;}
button{cursor:pointer;}

.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;white-space:nowrap;}

.btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:var(--accent2);}
.btn-ghost{background:transparent;color:var(--muted2);border:1px solid var(--border);}.btn-ghost:hover{background:var(--card2);color:var(--text);}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;}

input:focus,select:focus,textarea:focus{border-color:var(--accent);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:1000;}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:24px;width:540px;max-height:88vh;overflow-y:auto;}
@keyframes fi{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

// ── UI ATOMS ─────────────────────────────────────
function Av({user,size=26}){
  if(!user) return null;

function Prog({value,color="#6366f1",h=6}){
  return <div style={{background:'var(--border)',borderRadius:999,height:h,overflow:'hidden',width:'100%'}}><div style={{width:`${Math.min(value,100)}%`,background:color,height:'100%',borderRadius:999,transition:'width .3s'}}/></div>;
}
function SBadge({s,map,labels}){return <span className="tag" style={{background:(map[s]||'#6b7ba8')+'22',color:map[s]||'#6b7ba8',border:`1px solid ${(map[s]||'#6b7ba8')}44`}}>{labels[s]||s}</span>;}

// ── CHARTS ──────────────────────────────────────
function BarChart({data,color="#6366f1",h=120}){
  const max=Math.max(...data.map(d=>d.v),1);
  return <svg width="100%" height={h} style={{overflow:"visible"}}>{data.map((d,i)=>{const bh=(d.v/max)*(h-28);const x=(i/data.length)*100;const w=100/data.length*.7;return <g key={i}><rect x={`${x+100/data.length*.15}%`} y={h-28-bh} width={`${w}%`} height={bh} fill={color} rx="3" opacity=".85"/><text x={`${x+100/data.length*.5}%`} y={h-8} textAnchor="middle" fill="#4a5580" fontSize="10">{d.l}</text></g>;})}</svg>;
}
function Donut({segs,size=80}){
  let angle=-90;const r=32,cx=size/2,cy=size/2;const total=segs.reduce((s,d)=>s+d.v,0)||1;
  return <svg width={size} height={size}>{segs.map((seg,i)=>{const sw=(seg.v/total)*360;const a1=angle*Math.PI/180;const a2=(angle+sw)*Math.PI/180;const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);const x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);const lg=sw>180?1:0;const d=`M${cx},${cy} L${x1},${y1} A${r},${r},0,${lg},1,${x2},${y2} Z`;angle+=sw;return <path key={i} d={d} fill={seg.color}/>;})}<circle cx={cx} cy={cy} r={20} fill="var(--card)"/></svg>;
}

              <div style={{fontSize:11,color:'var(--muted)',marginBottom:9}}>{p.client}</div>
              <Prog value={p.progress} color={p.color}/>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:7}}>
                <Av user={USERS.find(u=>u.id===p.manager)} size={22}/>
                <span style={{fontSize:11,color:'var(--muted)'}}>📅 {p.deadline||'—'}</span>
              </div>
              <div style={{display:'flex',gap:3,marginTop:9,flexWrap:'wrap'}}>
                {cols.filter(c=>c!==col).map(c=><button key={c} onClick={()=>move(p,c)} style={{fontSize:9,padding:'2px 7px',borderRadius:4,background:SC[c]+'22',color:SC[c],border:'none',cursor:'pointer'}}>{SL[c]}</button>)}
              </div>
            </div>)}
          </div>
        </div>)}
      </div>:
      <div style={{padding:18,overflowY:'auto',height:'100%'}}>
        <table style={{width:'100%',borderCollapse:'separate',borderSpacing:'0 5px'}}>
          <thead><tr>{['Projeto','Cliente','Status','Prior.','Progresso','Orçamento','Prazo'].map(h=><th key={h} style={{fontSize:10,color:'var(--muted)',fontWeight:600,textAlign:'left',padding:'0 12px',textTransform:'uppercase',letterSpacing:.8}}>{h}</th>)}</tr></thead>
          <tbody>{d.projects.map(p=><tr key={p.id}>
            <td style={{padding:'10px 12px',background:'var(--card)',borderRadius:'8px 0 0 8px',borderLeft:`3px solid ${p.color}`}}><div style={{fontSize:13,fontWeight:600}}>{p.name}</div><div style={{fontSize:10,color:'var(--muted)'}}>{p.desc?.slice(0,35)}…</div></td>
            <td style={{padding:'10px 12px',background:'var(--card)',fontSize:12,color:'var(--muted2)'}}>{p.client}</td>
            <td style={{padding:'10px 12px',background:'var(--card)'}}><SBadge s={p.status} map={SC} labels={SL}/></td>
            <td style={{padding:'10px 12px',background:'var(--card)'}}><span className="tag" style={{background:PC[p.priority]+'22',color:PC[p.priority],fontSize:10}}>{PL[p.priority]}</span></td>
            <td style={{padding:'10px 12px',background:'var(--card)',minWidth:110}}><div style={{fontSize:10,color:'var(--muted2)',marginBottom:3}}>{p.progress}%</div><Prog value={p.progress} color={p.color}/></td>
            <td style={{padding:'10px 12px',background:'var(--card)',fontSize:11}}><div>{fmt(p.budget)}</div><div style={{color:p.spent/p.budget>.9?'var(--red)':'var(--muted)',fontSize:10}}>Gasto: {fmt(p.spent)}</div></td>

    {modal&&<div className="modal-overlay" onClick={()=>setModal(false)}><div className="modal fi" onClick={e=>e.stopPropagation()}>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:11}}>
        {[['Nome','name','text'],['Cliente','client','text'],['Prazo','deadline','date'],['Orçamento (R$)','budget','number']].map(([l,k,t])=><div key={k}><div style={{fontSize:12,color:'var(--muted)',marginBottom:5}}>{l}</div><input type={t} value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))}/></div>)}
        <div><div style={{fontSize:12,color:'var(--muted)',marginBottom:5}}>Status</div><select value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))}>{Object.entries(SL).map(([k,v])=><option key={k} value={k}>{v}</option>)}</select></div>
        <div><div style={{fontSize:12,color:'var(--muted)',marginBottom:5}}>Prioridade</div><select value={form.priority} onChange={e=>setForm(f=>({...f,priority:e.target.value}))}>{Object.entries(PL).map(([k,v])=><option key={k} value={k}>{v}</option>)}</select></div>

}

// ── TASKS ────────────────────────────────────────
function Tasks({d,sd}){
  const [flt,setFlt]=useState({status:'all',priority:'all',project:'all'});
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({title:'',projectId:'',assignee:'',status:'todo',priority:'medium',due:'',desc:'',tags:''});
  const filtered=d.tasks.filter(t=>(flt.status==='all'||t.status===flt.status)&&(flt.priority==='all'||t.priority===flt.priority)&&(flt.project==='all'||t.projectId===Number(flt.project)));
  const save=()=>{if(!form.title)return;sd(x=>({...x,tasks:[...x.tasks,{...form,id:Date.now(),projectId:Number(form.projectId),assignee:Number(form.assignee),tags:form.tags.split(',').map(t=>t.trim()).filter(Boolean)}]}));setModal(false);};
  const upd=(id,s)=>sd(x=>({...x,tasks:x.tasks.map(t=>t.id===id?{...t,status:s}:t)}));
  return <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
    <TB title="Tarefas" sub={`${filtered.length} tarefas`}><button className="btn btn-primary" onClick={()=>setModal(true)}>+ Nova Tarefa</button></TB>
    <div style={{padding:'10px 22px',borderBottom:'1px solid var(--border)',display:'flex',gap:9,background:'var(--sidebar)',flexWrap:'wrap',alignItems:'center'}}>
      <select value={flt.status} onChange={e=>setFlt(f=>({...f,status:e.target.value}))} style={{width:'auto'}}><option value="all">Todos Status</option>{Object.entries(SL).map(([k,v])=><option key={k} value={k}>{v}</option>)}</select>
      <select value={flt.priority} onChange={e=>setFlt(f=>({...f,priority:e.target.value}))} style={{width:'auto'}}><option value="all">Todas Prior.</option>{Object.entries(PL).map(([k,v])=><option key={k} value={k}>{v}</option>)}</select>
      <select value={flt.project} onChange={e=>setFlt(f=>({...f,project:e.target.value}))} style={{width:'auto'}}><option value="all">Todos Projetos</option>{d.projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select>
      <div style={{marginLeft:'auto',display:'flex',gap:6}}>{Object.entries(SC).map(([k,c])=>{const n=filtered.filter(t=>t.status===k).length;return <span key={k} className="tag" style={{background:c+'22',color:c}}>{n} {SL[k]}</span>;})}</div>
    </div>
    <div style={{flex:1,overflowY:'auto',padding:18}}>
      {Object.keys(SL).map(status=>{const grp=filtered.filter(t=>t.status===status);if(!grp.length)return null;return <div key={status} style={{marginBottom:20}}>
        <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:9}}><div style={{width:9,height:9,borderRadius:2,background:SC[status]}}/><span style={{fontSize:11,fontWeight:700,color:'var(--muted2)',textTransform:'uppercase',letterSpacing:1}}>{SL[status]}</span><span style={{fontSize:10,color:'var(--muted)',background:'var(--card2)',padding:'1px 6px',borderRadius:99}}>{grp.length}</span></div>
        <div style={{display:'flex',flexDirection:'column',gap:5}}>
          {grp.map(t=>{const proj=d.projects.find(p=>p.id===t.projectId);const user=USERS.find(u=>u.id===t.assignee);return <div key={t.id} className="card" style={{display:'flex',alignItems:'center',gap:11,padding:'9px 13px'}}>
            <button onClick={()=>upd(t.id,t.status==='done'?'todo':'done')} style={{width:17,height:17,borderRadius:'50%',border:`2px solid ${t.status==='done'?SC.done:SC[t.status]}`,background:t.status==='done'?SC.done:'transparent',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:9}}>
              {t.status==='done'&&'✓'}
            </button>
            <div style={{width:7,height:7,borderRadius:'50%',background:PC[t.priority],flexShrink:0}}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:500,color:t.status==='done'?'var(--muted)':'var(--text)',textDecoration:t.status==='done'?'line-through':'none'}}>{t.title}</div>
              <div style={{display:'flex',gap:4,marginTop:3,flexWrap:'wrap'}}>{t.tags?.map(tag=><span key={tag} className="tag" style={{background:'var(--border)',color:'var(--muted2)',fontSize:9}}>{tag}</span>)}</div>
            </div>
            {proj&&<span style={{fontSize:10,color:proj.color,background:proj.color+'22',padding:'2px 7px',borderRadius:99,whiteSpace:'nowrap'}}>{proj.name.length>18?proj.name.slice(0,18)+'…':proj.name}</span>}
            {t.due&&<div style={{fontSize:10,color:'var(--muted)',whiteSpace:'nowrap'}}>📅 {t.due}</div>}
            <Av user={user} size={22}/>
            <select value={t.status} onChange={e=>upd(t.id,e.target.value)} style={{width:'auto',fontSize:10,padding:'3px 5px'}}>{Object.entries(SL).map(([k,v])=><option key={k} value={k}>{v}</option>)}</select>
          </div>;})}
        </div>
      </div>;})}
    </div>
    {modal&&<div className="modal-overlay" onClick={()=>setModal(false)}><div className="modal fi" onClick={e=>e.stopPropagation()}>
      <div className="syne" style={{fontSize:16,fontWeight:700,marginBottom:18}}>Nova Tarefa</div>
      <div style={{display:'grid',gap:11}}>
        <div><div style={{fontSize:12,color:'var(--muted)',marginBottom:5}}>Título</div><input type="text" value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))}/></div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:11}}>
          <div><div style={{fontSize:12,color:'var(--muted)',marginBottom:5}}>Projeto</div><select value={form.projectId} onChange={e=>setForm(f=>({...f,projectId:e.target.value}))}><option value="">Selecione</option>{d.projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></div>
          <div><div style={{fontSize:12,color:'var(--muted)',marginBottom:5}}>Responsável</div><select value={form.assignee} onChange={e=>setForm(f=>({...f,assignee:e.target.value}))}><option value="">Selecione</option>{USERS.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></div>
          <div><div style={{fontSize:12,color:'var(--muted)',marginBottom:5}}>Status</div><select value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))}>{Object.entries(SL).map(([k,v])=><option key={k} value={k}>{v}</option>)}</select></div>
          <div><div style={{fontSize:12,color:'var(--muted)',marginBottom:5}}>Prioridade</div><select value={form.priority} onChange={e=>setForm(f=>({...f,priority:e.target.value}))}>{Object.entries(PL).map(([k,v])=><option key={k} value={k}>{v}</option>)}</select></div>
          <div><div style={{fontSize:12,color:'var(--muted)',marginBottom:5}}>Prazo</div><input type="date" value={form.due} onChange={e=>setForm(f=>({...f,due:e.target.value}))}/></div>
          <div><div style={{fontSize:12,color:'var(--muted)',marginBottom:5}}>Tags (vírgula)</div><input type="text" value={form.tags} onChange={e=>setForm(f=>({...f,tags:e.target.value}))} placeholder="design, copy"/></div>
        </div>
        <div><div style={{fontSize:12,color:'var(--muted)',marginBottom:5}}>Descrição</div><textarea value={form.desc} onChange={e=>setForm(f=>({...f,desc:e.target.value}))} rows={2} style={{resize:'vertical'}}/></div>
      </div>
      <div style={{display:'flex',gap:8,marginTop:18,justifyContent:'flex-end'}}><button className="btn btn-ghost" onClick={()=>setModal(false)}>Cancelar</button><button className="btn btn-primary" onClick={save}>Criar Tarefa</button></div>
    </div></div>}
  </div>;
}

// ── LEADS ────────────────────────────────────────
function Leads({d,sd}){
  const stages=['new','contacted','qualified','proposal','negotiation','won','lost'];
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({company:'',contact:'',email:'',source:'inbound',stage:'new',value:'',owner:1,notes:''});
  const save=()=>{if(!form.company)return;sd(x=>({...x,leads:[...x.leads,{...form,id:Date.now(),value:Number(form.value)||0,owner:Number(form.owner),created:new Date().toISOString().split('T')[0]}]}));setModal(false);};
  const move=(l,s)=>sd(x=>({...x,leads:x.leads.map(ld=>ld.id===l.id?{...ld,stage:s}:ld)}));
  const pipe=d.leads.filter(l=>!['won','lost'].includes(l.stage)).reduce((s,l)=>s+l.value,0);
  return <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
    <TB title="Pipeline de Leads" sub={`${d.leads.length} leads · ${fmt(pipe)} em pipeline`}><button className="btn btn-primary" onClick={()=>setModal(true)}>+ Novo Lead</button></TB>
    <div style={{flex:1,overflow:'hidden'}}>
      <div style={{display:'flex',gap:11,padding:'14px 18px',height:'100%',overflowX:'auto'}}>
        {stages.map(stage=>{const leads=d.leads.filter(l=>l.stage===stage);const tot=leads.reduce((s,l)=>s+l.value,0);return <div key={stage} style={{minWidth:200,width:200,display:'flex',flexDirection:'column',flexShrink:0}}>
          <div style={{marginBottom:9}}>
            <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:3}}><div style={{width:7,height:7,borderRadius:2,background:StageC[stage]}}/><span style={{fontSize:10,fontWeight:700,color:'var(--muted2)',textTransform:'uppercase',letterSpacing:.8}}>{StageL[stage]}</span><span style={{marginLeft:'auto',fontSize:9,background:StageC[stage]+'22',color:StageC[stage],padding:'1px 5px',borderRadius:99}}>{leads.length}</span></div>
            {tot>0&&<div style={{fontSize:10,color:'var(--muted)'}}>{fmt(tot)}</div>}
          </div>
          <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:7}}>
            {leads.map(l=><div key={l.id} className="card" style={{fontSize:11,borderLeft:`3px solid ${StageC[stage]}`,padding:'10px 12px'}}>
              <div style={{fontWeight:700,marginBottom:3}}>{l.company}</div>
              <div style={{color:'var(--muted)',marginBottom:6}}>{l.contact}</div>
              <div style={{fontSize:13,fontWeight:700,color:'var(--green)',marginBottom:7}}>{fmt(l.value)}</div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:7}}>
                <span className="tag" style={{background:'var(--border)',color:'var(--muted2)',fontSize:9}}>{l.source}</span>
                <Av user={USERS.find(u=>u.id===l.owner)} size={18}/>
              </div>
              <div style={{display:'flex',gap:3,flexWrap:'wrap'}}>
                {stages.filter(s=>s!==stage).slice(0,3).map(s=><button key={s} onClick={()=>move(l,s)} style={{fontSize:8,padding:'1px 5px',borderRadius:3,background:StageC[s]+'22',color:StageC[s],border:'none',cursor:'pointer'}}>{StageL[s]}</button>)}
              </div>
            </div>)}
          </div>
        </div>;})}
      </div>
    </div>
    {modal&&<div className="modal-overlay" onClick={()=>setModal(false)}><div className="modal fi" onClick={e=>e.stopPropagation()}>
      <div className="syne" style={{fontSize:16,fontWeight:700,marginBottom:18}}>Novo Lead</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:11}}>
        {[['Empresa','company','text'],['Contato','contact','text'],['E-mail','email','text'],['Valor Est. (R$)','value','number']].map(([l,k,t])=><div key={k}><div style={{fontSize:12,color:'var(--muted)',marginBottom:5}}>{l}</div><input type={t} value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))}/></div>)}
        <div><div style={{fontSize:12,color:'var(--muted)',marginBottom:5}}>Origem</div><select value={form.source} onChange={e=>setForm(f=>({...f,source:e.target.value}))}>{['referral','inbound','outbound','event','social'].map(s=><option key={s} value={s}>{s}</option>)}</select></div>
        <div><div style={{fontSize:12,color:'var(--muted)',marginBottom:5}}>Estágio</div><select value={form.stage} onChange={e=>setForm(f=>({...f,stage:e.target.value}))}>{stages.map(s=><option key={s} value={s}>{StageL[s]}</option>)}</select></div>
        <div><div style={{fontSize:12,color:'var(--muted)',marginBottom:5}}>Responsável</div><select value={form.owner} onChange={e=>setForm(f=>({...f,owner:e.target.value}))}>{USERS.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></div>
        <div style={{gridColumn:'1/-1'}}><div style={{fontSize:12,color:'var(--muted)',marginBottom:5}}>Notas</div><textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} rows={2} style={{resize:'vertical'}}/></div>
      </div>
      <div style={{display:'flex',gap:8,marginTop:18,justifyContent:'flex-end'}}><button className="btn btn-ghost" onClick={()=>setModal(false)}>Cancelar</button><button className="btn btn-primary" onClick={save}>Adicionar</button></div>
    </div></div>}
  </div>;
}

// ── CAMPAIGNS ────────────────────────────────────
function Campaigns({d}){
  const totSpend=d.campaigns.reduce((s,c)=>s+c.spend,0);
  const totImpr=d.campaigns.reduce((s,c)=>s+c.impressions,0);
  const totClk=d.campaigns.reduce((s,c)=>s+c.clicks,0);
  const totConv=d.campaigns.reduce((s,c)=>s+c.conversions,0);
  return <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
    <TB title="Campanhas de Mídia Paga" sub={`${d.campaigns.length} campanhas`}/>
    <div style={{flex:1,overflowY:'auto',padding:18}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:11,marginBottom:18}}>
        {[['Investimento',fmt(totSpend),'#6366f1'],['Impressões',fmtN(totImpr),'#06b6d4'],['Cliques',fmtN(totClk),'#f59e0b'],['Conversões',totConv,'#22c55e'],['CTR Médio',(totImpr>0?(totClk/totImpr*100).toFixed(2):0)+'%','#ec4899']].map(([l,v,c],i)=><div key={i} className="card" style={{textAlign:'center'}}><div style={{fontSize:10,color:'var(--muted)',marginBottom:5}}>{l}</div><div className="syne" style={{fontSize:18,fontWeight:700,color:c}}>{v}</div></div>)}
      </div>
      <div className="card" style={{padding:0,overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{background:'var(--card2)'}}>{['Campanha','Plataforma','Status','Orçamento','Gasto','Impressões','Cliques','Conv.','CTR','ROAS'].map(h=><th key={h} style={{fontSize:10,color:'var(--muted)',fontWeight:600,padding:'11px 13px',textAlign:'left',whiteSpace:'nowrap'}}>{h}</th>)}</tr></thead>
          <tbody>{d.campaigns.map(c=>{
            const ctr=c.impressions>0?(c.clicks/c.impressions*100).toFixed(2):0;
            const roas=c.spend>0?(c.conversions*50/c.spend).toFixed(1):0;
            const bp=Math.round(c.spend/c.budget*100);
            const sc={active:'#22c55e',paused:'#f59e0b',ended:'#6b7ba8'};
            return <tr key={c.id} style={{borderTop:'1px solid var(--border)'}}>
              <td style={{padding:'11px 13px'}}><div style={{fontSize:12,fontWeight:600}}>{c.name}</div><div style={{fontSize:10,color:'var(--muted)'}}>{d.projects.find(p=>p.id===c.projectId)?.client}</div></td>
              <td style={{padding:'11px 13px'}}><span style={{fontSize:12}}>{PlatE[c.platform]||'📌'}</span><span style={{fontSize:11,marginLeft:5,color:PlatC[c.platform],fontWeight:600,textTransform:'capitalize'}}>{c.platform}</span></td>
              <td style={{padding:'11px 13px'}}><span className="tag" style={{background:(sc[c.status]||'#6b7ba8')+'22',color:sc[c.status]||'#6b7ba8'}}>{c.status}</span></td>
              <td style={{padding:'11px 13px'}}><div style={{fontSize:11}}>{fmt(c.budget)}</div><Prog value={bp} color={bp>90?'var(--red)':bp>70?'var(--yellow)':'var(--accent)'}/><div style={{fontSize:9,color:'var(--muted)',marginTop:2}}>{bp}%</div></td>
              <td style={{padding:'11px 13px',fontSize:12,fontWeight:600,color:bp>90?'var(--red)':'var(--text)'}}>{fmt(c.spend)}</td>
              <td style={{padding:'11px 13px',fontSize:12,color:'var(--muted2)'}}>{fmtN(c.impressions)}</td>
              <td style={{padding:'11px 13px',fontSize:12,color:'var(--muted2)'}}>{fmtN(c.clicks)}</td>
              <td style={{padding:'11px 13px',fontSize:12,fontWeight:700,color:'var(--green)'}}>{c.conversions}</td>
              <td style={{padding:'11px 13px',fontSize:12}}>{ctr}%</td>
              <td style={{padding:'11px 13px',fontSize:13,fontWeight:800,color:roas>3?'var(--green)':roas>1?'var(--yellow)':'var(--red)'}}>{roas}x</td>
            </tr>;})}
          </tbody>
        </table>
      </div>
    </div>
  </div>;
}

          </div>

          <div style={{fontSize:9,color:'var(--muted)',marginTop:3}}>{Math.round(c.spend/c.budget*100)}% do orçamento</div>
        </div>;})}
      </>}
    </div>
  </div>;
}

// ── FINANCE ──────────────────────────────────────
function Finance({d,sd}){
  const [tab,setTab]=useState('invoices');
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({client:'',project:'',total:'',due:'',notes:''});
  const save=()=>{if(!form.client||!form.total)return;const num=`NF-2025-${String(d.invoices.length+1).padStart(3,'0')}`;sd(x=>({...x,invoices:[...x.invoices,{...form,id:Date.now(),number:num,status:'draft',total:Number(form.total),paid:null}]}));setModal(false);};
  const upd=(id,s)=>sd(x=>({...x,invoices:x.invoices.map(i=>i.id===id?{...i,status:s,paid:s==='paid'?new Date().toISOString().split('T')[0]:i.paid}:i)}));
  const totPaid=d.invoices.filter(i=>i.status==='paid').reduce((s,i)=>s+i.total,0);
  const totPend=d.invoices.filter(i=>['sent','overdue'].includes(i.status)).reduce((s,i)=>s+i.total,0);
  const totH=d.timeLogs.reduce((s,l)=>s+l.hours,0);
  const billH=d.timeLogs.filter(l=>l.billable).reduce((s,l)=>s+l.hours,0);
  return <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
    <TB title="Financeiro">
      <div style={{display:'flex',gap:4}}>{[{id:'invoices',l:'Faturas'},{id:'timelogs',l:'Horas'}].map(t=><button key={t.id} onClick={()=>setTab(t.id)} className="btn" style={{fontSize:11,background:tab===t.id?'var(--accent)':'transparent',color:tab===t.id?'#fff':'var(--muted2)',border:`1px solid ${tab===t.id?'var(--accent)':'var(--border)'}`}}>{t.l}</button>)}</div>
      {tab==='invoices'&&<button className="btn btn-primary" onClick={()=>setModal(true)}>+ Nova Fatura</button>}
    </TB>
    <div style={{flex:1,overflowY:'auto',padding:18}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:11,marginBottom:18}}>
        {tab==='invoices'?[['Recebido',fmt(totPaid),'✅','#22c55e'],['A Receber',fmt(totPend),'⏳','#f59e0b'],['Em Atraso',fmt(d.invoices.filter(i=>i.status==='overdue').reduce((s,i)=>s+i.total,0)),'⚠️','#ef4444'],['Total Emitido',fmt(d.invoices.reduce((s,i)=>s+i.total,0)),'🧾','#6366f1']]:[['Total de Horas',`${totH}h`,'⏱️','#6366f1'],['Horas Faturáveis',`${billH}h`,'💰','#22c55e'],['Taxa Billing',`${Math.round(billH/totH*100)}%`,'📊','#f59e0b'],['Custo Est.',fmt(billH*150),'💵','#ec4899']].map(([l,v,i,c])=><div key={l} className="card" style={{display:'flex',alignItems:'center',gap:11}}><div style={{width:36,height:36,borderRadius:9,background:c+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:17}}>{i}</div><div><div style={{fontSize:10,color:'var(--muted)'}}>{l}</div><div className="syne" style={{fontSize:17,fontWeight:700,color:c}}>{v}</div></div></div>)}
      </div>
      {tab==='invoices'?<div className="card" style={{padding:0,overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{background:'var(--card2)'}}>{['Número','Cliente','Projeto','Valor','Status','Vencimento','Pago','Ações'].map(h=><th key={h} style={{fontSize:10,color:'var(--muted)',fontWeight:600,padding:'11px 13px',textAlign:'left'}}>{h}</th>)}</tr></thead>
          <tbody>{d.invoices.map(inv=><tr key={inv.id} style={{borderTop:'1px solid var(--border)'}}>
            <td style={{padding:'11px 13px',fontSize:12,fontWeight:700,color:'var(--accent)'}}>{inv.number}</td>
            <td style={{padding:'11px 13px',fontSize:12,fontWeight:600}}>{inv.client}</td>
            <td style={{padding:'11px 13px',fontSize:10,color:'var(--muted)'}}>{inv.project}</td>
            <td style={{padding:'11px 13px',fontSize:13,fontWeight:700,color:'var(--green)'}}>{fmt(inv.total)}</td>
            <td style={{padding:'11px 13px'}}><span className="tag" style={{background:InvC[inv.status]+'22',color:InvC[inv.status]}}>{inv.status}</span></td>
            <td style={{padding:'11px 13px',fontSize:11,color:inv.status==='overdue'?'var(--red)':'var(--muted2)'}}>{inv.due}</td>
            <td style={{padding:'11px 13px',fontSize:11,color:'var(--muted)'}}>{inv.paid||'—'}</td>
            <td style={{padding:'11px 13px'}}><div style={{display:'flex',gap:4}}>
              {inv.status!=='paid'&&<button onClick={()=>upd(inv.id,'paid')} style={{fontSize:10,padding:'3px 7px',borderRadius:4,background:'#22c55e22',color:'var(--green)',border:'none',cursor:'pointer'}}>✓ Pago</button>}
              {inv.status==='draft'&&<button onClick={()=>upd(inv.id,'sent')} style={{fontSize:10,padding:'3px 7px',borderRadius:4,background:'var(--accent)22',color:'var(--accent)',border:'none',cursor:'pointer'}}>Enviar</button>}
            </div></td>
          </tr>)}</tbody>
        </table>
      </div>:
      <div className="card" style={{padding:0,overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{background:'var(--card2)'}}>{['Profissional','Projeto','Tarefa','Horas','Data','Faturável'].map(h=><th key={h} style={{fontSize:10,color:'var(--muted)',fontWeight:600,padding:'11px 13px',textAlign:'left'}}>{h}</th>)}</tr></thead>
          <tbody>{d.timeLogs.map(log=>{const user=USERS.find(u=>u.id===log.user);return <tr key={log.id} style={{borderTop:'1px solid var(--border)'}}>
            <td style={{padding:'11px 13px'}}><div style={{display:'flex',alignItems:'center',gap:7}}><Av user={user} size={22}/><span style={{fontSize:12,fontWeight:600}}>{user?.name}</span></div></td>
            <td style={{padding:'11px 13px',fontSize:11}}>{log.project}</td>
            <td style={{padding:'11px 13px',fontSize:10,color:'var(--muted)'}}>{log.task}</td>
            <td style={{padding:'11px 13px',fontSize:13,fontWeight:700,color:'var(--accent)'}}>{log.hours}h</td>
            <td style={{padding:'11px 13px',fontSize:11,color:'var(--muted2)'}}>{log.date}</td>
            <td style={{padding:'11px 13px'}}><span className="tag" style={{background:log.billable?'#22c55e22':'#6b7ba822',color:log.billable?'#22c55e':'#6b7ba8'}}>{log.billable?'Sim':'Não'}</span></td>
          </tr>;})}
          </tbody>
        </table>
      </div>}
    </div>
    {modal&&<div className="modal-overlay" onClick={()=>setModal(false)}><div className="modal fi" onClick={e=>e.stopPropagation()}>
      <div className="syne" style={{fontSize:16,fontWeight:700,marginBottom:18}}>Nova Fatura</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:11}}>
        <div><div style={{fontSize:12,color:'var(--muted)',marginBottom:5}}>Cliente</div><select value={form.client} onChange={e=>setForm(f=>({...f,client:e.target.value}))}><option value="">Selecione</option>{d.clients.map(c=><option key={c.id} value={c.name}>{c.name}</option>)}</select></div>
        <div><div style={{fontSize:12,color:'var(--muted)',marginBottom:5}}>Projeto</div><select value={form.project} onChange={e=>setForm(f=>({...f,project:e.target.value}))}><option value="">Selecione</option>{d.projects.map(p=><option key={p.id} value={p.name}>{p.name}</option>)}</select></div>
        {[['Valor (R$)','total','number'],['Vencimento','due','date']].map(([l,k,t])=><div key={k}><div style={{fontSize:12,color:'var(--muted)',marginBottom:5}}>{l}</div><input type={t} value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))}/></div>)}
        <div style={{gridColumn:'1/-1'}}><div style={{fontSize:12,color:'var(--muted)',marginBottom:5}}>Observações</div><textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} rows={2} style={{resize:'vertical'}}/></div>
      </div>
      <div style={{display:'flex',gap:8,marginTop:18,justifyContent:'flex-end'}}><button className="btn btn-ghost" onClick={()=>setModal(false)}>Cancelar</button><button className="btn btn-primary" onClick={save}>Criar Fatura</button></div>
    </div></div>}
  </div>;
}

// ── CALENDAR ─────────────────────────────────────
function Calendar({d}){
  const today=new Date();
  const [cur,setCur]=useState({y:today.getFullYear(),m:today.getMonth()});
  const MN=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const days=new Date(cur.y,cur.m+1,0).getDate();
  const start=new Date(cur.y,cur.m,1).getDay();
  const tbd={},pbd={};
  d.tasks.forEach(t=>{if(t.due){tbd[t.due]=tbd[t.due]||[];tbd[t.due].push(t);}});
  d.projects.forEach(p=>{if(p.deadline){pbd[p.deadline]=pbd[p.deadline]||[];pbd[p.deadline].push(p);}});
  return <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
    <TB title="Calendário" sub="Prazos e entregas">
      <button className="btn btn-ghost" onClick={()=>setCur(c=>c.m===0?{y:c.y-1,m:11}:{...c,m:c.m-1})}>‹</button>
      <span style={{fontSize:13,fontWeight:600,minWidth:150,textAlign:'center'}}>{MN[cur.m]} {cur.y}</span>
      <button className="btn btn-ghost" onClick={()=>setCur(c=>c.m===11?{y:c.y+1,m:0}:{...c,m:c.m+1})}>›</button>
    </TB>
    <div style={{flex:1,overflowY:'auto',padding:18}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:2}}>
        {['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].map(dd=><div key={dd} style={{textAlign:'center',fontSize:10,fontWeight:700,color:'var(--muted)',padding:'7px 0',textTransform:'uppercase',letterSpacing:1}}>{dd}</div>)}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
        {Array.from({length:start}).map((_,i)=><div key={'e'+i} style={{minHeight:85,background:'var(--card2)',borderRadius:6,opacity:.25}}/>)}
        {Array.from({length:days}).map((_,i)=>{const day=i+1;const ds=`${cur.y}-${String(cur.m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;const isT=today.getDate()===day&&today.getMonth()===cur.m&&today.getFullYear()===cur.y;const tasks=tbd[ds]||[];const projs=pbd[ds]||[];
          return <div key={day} style={{minHeight:85,background:'var(--card)',borderRadius:6,padding:'5px',border:`1px solid ${isT?'var(--accent)':'var(--border)'}`}}>
            <div style={{fontSize:11,fontWeight:isT?700:400,color:isT?'var(--accent)':'var(--muted2)',marginBottom:3}}>{day}</div>
            {projs.map(p=><div key={p.id} style={{fontSize:8,background:p.color+'33',color:p.color,borderRadius:3,padding:'1px 3px',marginBottom:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontWeight:700}}>🚀 {p.name}</div>)}
            {tasks.slice(0,2).map(t=><div key={t.id} style={{fontSize:8,background:SC[t.status]+'22',color:SC[t.status],borderRadius:3,padding:'1px 3px',marginBottom:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>✅ {t.title}</div>)}
            {tasks.length>2&&<div style={{fontSize:8,color:'var(--muted)'}}>+{tasks.length-2}</div>}
          </div>;})}
      </div>
    </div>
  </div>;
}

// ── SIDEBAR + APP ────────────────────────────────
const NAV=[{id:'dashboard',i:'⚡',l:'Dashboard'},{id:'projects',i:'🚀',l:'Projetos'},{id:'tasks',i:'✅',l:'Tarefas'},{id:'clients',i:'🏢',l:'Clientes'},{id:'leads',i:'🎯',l:'Leads'},{id:'campaigns',i:'📢',l:'Campanhas'},{id:'reports',i:'📊',l:'Relatórios'},{id:'finance',i:'💰',l:'Financeiro'},{id:'calendar',i:'📅',l:'Calendário'}];

function App(){
  const [page,setPage]=useState('dashboard');
  const [data,setData]=useState(INIT);
  const views={dashboard:<Dashboard d={data}/>,projects:<Projects d={data} sd={setData}/>,tasks:<Tasks d={data} sd={setData}/>,clients:<Clients d={data} sd={setData}/>,leads:<Leads d={data} sd={setData}/>,campaigns:<Campaigns d={data}/>,reports:<Reports d={data}/>,finance:<Finance d={data} sd={setData}/>,calendar:<Calendar d={data}/>};
  return <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
    <div style={{width:210,background:'var(--sidebar)',borderRight:'1px solid var(--border)',display:'flex',flexDirection:'column',flexShrink:0}}>
      <div style={{padding:'18px 14px',borderBottom:'1px solid var(--border)'}}>
        <div className="syne" style={{fontSize:17,fontWeight:800,letterSpacing:-.5}}><span style={{color:'var(--accent)'}}>Agência</span>OS</div>
        <div style={{fontSize:10,color:'var(--muted)',marginTop:2}}>Gestão Completa</div>
      </div>
      <nav style={{flex:1,padding:'10px 6px',overflowY:'auto'}}>
        {NAV.map(n=><button key={n.id} onClick={()=>setPage(n.id)} style={{width:'100%',display:'flex',alignItems:'center',gap:9,padding:'9px 12px',borderRadius:8,border:'none',background:page===n.id?'var(--accent)':'transparent',color:page===n.id?'#fff':'var(--muted2)',fontSize:12,fontWeight:page===n.id?600:400,marginBottom:1,transition:'all .12s',textAlign:'left',cursor:'pointer'}}><span style={{fontSize:15}}>{n.i}</span>{n.l}</button>)}
      </nav>
      <div style={{padding:10,borderTop:'1px solid var(--border)'}}>
        <div style={{display:'flex',alignItems:'center',gap:9,padding:'7px 10px',borderRadius:8,background:'var(--card2)'}}>
          <Av user={USERS[0]} size={28}/>
          <div><div style={{fontSize:12,fontWeight:600}}>{USERS[0].name}</div><div style={{fontSize:9,color:'var(--muted)'}}>{USERS[0].role}</div></div>
        </div>
      </div>
    </div>
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}} className="fi">
      {views[page]}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
